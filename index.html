<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Habit Impact Input</title>
</head>
<body>

  <h2>Habit Impact Calculator</h2>

  <form>

    <label for="showerMinutes">Average shower minutes per day (0–120):</label><br>
    <input
      type="number"
      id="showerMinutes"
      name="showerMinutesPerDay"
      min="0"
      max="120"
      step="0.1"
      required
    ><br><br>

    <label for="redMeat">Red meat meals per week (0–50):</label><br>
    <input
      type="number"
      id="redMeat"
      name="redMeatMealsPerWeek"
      min="0"
      max="50"
      step="1"
      required
    ><br><br>

    <label for="carMiles">Car miles driven per week (0–5000):</label><br>
    <input
      type="number"
      id="carMiles"
      name="carMilesPerWeek"
      min="0"
      max="5000"
      step="0.1"
      required
    ><br><br>

    <label for="flights">Flights per year (0–100):</label><br>
    <input
      type="number"
      id="flights"
      name="flightsPerYear"
      min="0"
      max="100"
      step="1"
      required
    ><br><br>

    <label for="fashion">Fast fashion items bought per month (0–100):</label><br>
    <input
      type="number"
      id="fashion"
      name="fashionItemsPerMonth"
      min="0"
      max="100"
      step="1"
      required
    ><br><br>

    <button type="submit">Calculate Impact</button>

  </form>

</body>
</html>
